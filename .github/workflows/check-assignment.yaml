on: push
name: Check Assignment
jobs:
  check-allowed-files:
    runs-on: self-hosted
    container:
      image: ghcr.io/dukestatsci/r_gh_actions:latest
    steps:
    - name: Checkout
      uses: actions/checkout@master
    - name: Check Files
      run: |
        checklist::quit_on_failure({
          checklist::check_allowed_files(
            c("hw-5.qmd", "README.md", "data/*", 
              "app/*", "images/*", ".vscode/*", 
              "*.ttf", ".python-version", "pyproject.toml")
          )
        })
      shell: Rscript {0}

  check-renders:
    runs-on: self-hosted
    container:
      image: ghcr.io/dukestatsci/r_gh_actions:latest
    steps:
    - name: Remove old artifacts
      uses: c-hive/gha-remove-artifacts@v1
      with:
        age: '0 seconds' # parsed by Moment.js
        skip-tags: false
        skip-recent: 0
    - name: Checkout
      uses: actions/checkout@master
    - name: Initialize uv
      run: |
        uv sync --active
    - name: Install known missing packages
      run: |
        pak::pak(c("ggtext", "scales", "glue", "ggimage", "reticulate"))
      shell: Rscript {0}
    - name: Install other missing pkgs
      run: |
        checklist::install_missing_pkgs()
      shell: Rscript {0}
    - name: Render (gfm)
      run: |
        uv run quarto render hw-5.qmd --execute --to gfm
    - name: Render (html)
      run: |
        uv run quarto render hw-5.qmd --execute --to html --embed-resources
    - name: Create artifact (md)
      uses: actions/upload-artifact@v6
      with:
        name: hw-5-md
        path: hw-5.md
    - name: Create artifact (html)
      uses: actions/upload-artifact@v6
      with:
        name: hw-5-html
        path: hw-5.html
